# fly.toml app configuration file generated for agar-io-dark-beacon-5661 on 2026-05-25T01:28:01+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agar-io-dark-beacon-5661'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # keep at least one machine alive so the WebSocket handshake doesn't time out
  # on a cold-start when a player first connects.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # 256MB OS-OOM-killed Node, then 512MB hit V8 process-out-of-memory (native
  # ArrayBuffer allocations starved when heap was big). 1024MB gives both the
  # JS heap and native Buffers (ws frames, socket buffers) comfortable headroom.
  memory_mb = 1024
